# Spring Boot 3.x (Backend for Nexus Finance)
server.port=8080
spring.application.name=nexus-backend

# Neon Postgres Database Configuration
spring.datasource.url=${DB_URL}
spring.datasource.username=neondb_owner
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# Hibernate / JPA configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Basic CORS allowed origins for local Flutter / Web dev
# In production, externalize to environment variables or config server
